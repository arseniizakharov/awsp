<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>AWSP — CLI exploration</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #f0eee9; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; }
  body { min-height: 100vh; }
  /* Make the design canvas full-page */
  #root { height: 100vh; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="terminal.jsx"></script>
<script type="text/babel" src="profiles.jsx"></script>
<script type="text/babel" src="v1-inquire.jsx"></script>
<script type="text/babel" src="v2-ratatui.jsx"></script>
<script type="text/babel" src="v3-skim.jsx"></script>
<script type="text/babel" src="v4-gum.jsx"></script>
<script type="text/babel" src="v5-status.jsx"></script>
<script type="text/babel" src="v6-native.jsx"></script>

<script type="text/babel">
function App() {
  return (
    <DesignCanvas>
      <DCSection
        id="pickers"
        title="awsp — interactive pickers"
        subtitle="Five CLI patterns drawn from popular Rust TUI libs (inquire, ratatui, skim, gum). All amber accents — not AWS orange."
      >
        <DCArtboard id="v1" label="A · Inquire — dense single-column picker" width={780} height={520}>
          <VariantInquire />
        </DCArtboard>
        <DCArtboard id="v4" label="B · Gum — airy, opinionated" width={620} height={520}>
          <VariantGum />
        </DCArtboard>
        <DCArtboard id="v3" label="C · Skim/fzf — fuzzy + preview pane" width={820} height={520}>
          <VariantSkim />
        </DCArtboard>
        <DCArtboard id="v2" label="D · Ratatui — full TUI dashboard" width={920} height={620}>
          <VariantRatatui />
        </DCArtboard>
      </DCSection>

      <DCSection
        id="native"
        title="Tuned to your terminal"
        subtitle="Same Tokyo Night-ish palette as your screenshot. Each card includes your prompt line so you see exactly how it lands."
      >
        <DCArtboard id="v6f" label="F · Numbered hotkeys — 1-9 jump, ⏎ activate" width={780} height={520}>
          <VariantNumbered />
        </DCArtboard>
        <DCArtboard id="v6g" label="G · Aligned table — every column scannable" width={860} height={520}>
          <VariantTable />
        </DCArtboard>
        <DCArtboard id="v6i" label="I · `awsp status` + ambiguous match" width={780} height={520}>
          <VariantStatusNative />
        </DCArtboard>
        <DCArtboard id="v6j" label="J · After switch — prompt picks up new profile" width={780} height={360}>
          <VariantSuccessNative />
        </DCArtboard>
      </DCSection>

      <DCSection
        id="flows"
        title="Post-selection flows (earlier round)"
        subtitle="Success, expired SSO + device flow, did-you-mean."
      >
        <DCArtboard id="v5" label="E · Status & error vignettes" width={780} height={620}>
          <VariantStatus />
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
